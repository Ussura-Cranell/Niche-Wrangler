version: '2.0'
mode: multi
subsets:
  угловая_полка:
    include:
      operator: AND
      conditions:
      - type: contains
        value: полк
      - type: contains
        value: углов
    exclude:
      operator: OR
      conditions:
      - type: contains
        value: штора
      - type: contains
        value: зеркал
      - type: contains
        value: тумб
      - type: contains
        value: раковин
      - type: contains
        value: вешалк
      - type: contains
        value: полотенц
      - type: contains
        value: подсветк
      - type: contains
        value: кромк
      - type: contains
        value: икон
      - type: contains
        value: иконостас
      - type: contains
        value: настольн
      - type: contains
        value: мыльниц
      - type: contains
        value: стеллаж
